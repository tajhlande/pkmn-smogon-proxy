services:
  pkmn-smogon-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${EXT_PORT:-3000}:INT_PORT"
    environment:
      - NODE_ENV=production
      - PORT=${INT_PORT:-3000}
      - LOG_LEVEL=info
      - CACHE_TTL=3600000
      - RATE_LIMIT_MAX=100
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${INT_PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
